# Docker Compose for AlgoU-Project
services:
  # MongoDB database
  mongo:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Node.js/Express backend
  backend:
    build:
      context: ./server
      dockerfile: DockerFile
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/algou

  # React frontend
  frontend:
    build:
      context: ./client
      dockerfile: DockerFile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data: