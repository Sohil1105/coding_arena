# Docker Compose for Coding Arena
services:
  # Node.js/Express backend
  backend:
    build:
      context: ./server
      dockerfile: DockerFile
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      - compiler
    command: >
      sh -c "npm install && node seedFromJson.js && node server.js"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # React frontend
  frontend:
    build:
      context: ./client
      dockerfile: DockerFile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - REACT_APP_API_URL=http://backend:5000
    networks:
      - app-network

  compiler:
    build:
      context: ./temp-compiler/backend
      dockerfile: DockerFile
    ports:
      - "8000:8000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
