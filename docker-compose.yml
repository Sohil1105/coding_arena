# Docker Compose for Coding Arena
services:
  # MongoDB database
  mongo:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Node.js/Express backend
  backend:
    build:
      context: ./server
      dockerfile: DockerFile
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    env_file:
      - .env
    command: >
      sh -c "node seed.js && node server.js"

  # React frontend
  frontend:
    build:
      context: ./client
      dockerfile: DockerFile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data:
